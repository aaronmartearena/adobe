<!DOCTYPE html>
<html lang="es-AR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Página no encontrada | Adobe Ingeniería</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400&family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --terra:   #FF6600;
      --charcoal:#14120D;
      --on-dark: #F1ECE1;
      --muted:   #B8B0A0;
      --sand:    #C8B89D;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: "Inter", system-ui, sans-serif;
      background: var(--charcoal);
      color: var(--on-dark);
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
      padding: 32px 24px;
      text-align: center;
    }
    .wrap { max-width: 520px; }
    .code {
      font-family: "Fraunces", Georgia, serif;
      font-size: clamp(80px, 18vw, 140px);
      font-weight: 300;
      line-height: 1;
      color: var(--terra);
      letter-spacing: -.03em;
      margin-bottom: 8px;
    }
    h1 {
      font-family: "Fraunces", Georgia, serif;
      font-size: clamp(22px, 4vw, 32px);
      font-weight: 400;
      color: #fff;
      margin-bottom: 18px;
    }
    p {
      font-size: 16px;
      color: var(--muted);
      line-height: 1.7;
      max-width: 38ch;
      margin: 0 auto 34px;
    }
    .btn {
      display: inline-flex; align-items: center; gap: 9px;
      font-family: "Inter", sans-serif; font-weight: 600; font-size: 15px;
      padding: 14px 26px; border-radius: 999px; text-decoration: none;
      background: var(--terra); color: #fff;
      box-shadow: 0 10px 28px -10px rgba(255,102,0,.6);
      transition: transform .3s, box-shadow .3s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 16px 34px -10px rgba(255,102,0,.8); }
    .divider {
      width: 40px; height: 2px;
      background: var(--terra); margin: 32px auto;
      opacity: .5;
    }
    .contact {
      font-size: 13px; color: var(--muted);
    }
    .contact a { color: var(--sand); text-decoration: none; }
    .contact a:hover { color: #fff; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="code">404</div>
    <h1>Página no encontrada</h1>
    <p>La dirección que buscás no existe o fue movida. Volvé al inicio y encontrás todo lo que necesitás.</p>
    <a href="/" class="btn">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 12L12 3l9 9M5 10v9a1 1 0 0 0 1 1h4v-5h4v5h4a1 1 0 0 0 1-1v-9"/>
      </svg>
      Volver al inicio
    </a>
    <div class="divider"></div>
    <p class="contact">
      ¿Necesitás ayuda?
      <a href="https://wa.me/5493875739888">WhatsApp +54 387 573-9888</a>
      o escribinos a
      <a href="mailto:adobeinge.dr@gmail.com">adobeinge.dr@gmail.com</a>
    </p>
  </div>
</body>
</html>
