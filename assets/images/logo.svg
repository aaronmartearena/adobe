<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 96" role="img" aria-label="Adobe Ingeniería">
  <title>Adobe Ingeniería</title>
  <defs>
    <linearGradient id="gOr" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FF8C3A"/>
      <stop offset="100%" stop-color="#FF6000"/>
    </linearGradient>
    <linearGradient id="gShade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#D05000"/>
      <stop offset="100%" stop-color="#E06010"/>
    </linearGradient>
    <filter id="fs">
      <feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-color="#993300" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- ══════ MONOGRAMA A ══════ -->
  <g filter="url(#fs)" transform="translate(5,5)">

    <!-- Apex redondeado (parte superior de la A) -->
    <path d="M38,6 Q47,-1 56,6 L60,18 Q47,10 34,18 Z"
          fill="url(#gOr)" stroke="#C84E00" stroke-width="0.5"/>

    <!-- Pata izquierda: recta, vertical -->
    <path d="M34,18 L38,82 L26,82 L24,18 Z"
          fill="url(#gOr)" stroke="#C84E00" stroke-width="0.5"/>

    <!-- Pata derecha: recta, vertical -->
    <path d="M60,18 L70,82 L82,82 L70,18 Z"
          fill="url(#gOr)" stroke="#C84E00" stroke-width="0.5"/>

    <!-- Barra transversal -->
    <rect x="33" y="47" width="28" height="9" rx="4.5"
          fill="#C84E00" stroke="#A83E00" stroke-width="0.4"/>
    <!-- brillo barra -->
    <rect x="36" y="48.5" width="22" height="3" rx="1.5" fill="#FF9050" opacity="0.5"/>

    <!-- ── Columnas (vigas horizontales) lado izquierdo ── -->
    <rect x="19" y="60" width="14" height="4"  rx="2" fill="#C84E00" opacity="0.8"/>
    <rect x="19" y="67" width="14" height="4"  rx="2" fill="#C84E00" opacity="0.8"/>
    <rect x="19" y="74" width="14" height="4"  rx="2" fill="#C84E00" opacity="0.8"/>

    <!-- ── Columnas (vigas horizontales) lado derecho ── -->
    <rect x="73" y="60" width="14" height="4"  rx="2" fill="#C84E00" opacity="0.8"/>
    <rect x="73" y="67" width="14" height="4"  rx="2" fill="#C84E00" opacity="0.8"/>
    <rect x="73" y="74" width="14" height="4"  rx="2" fill="#C84E00" opacity="0.8"/>

    <!-- Base / platea -->
    <rect x="18" y="82" width="70" height="7" rx="3.5"
          fill="url(#gOr)" stroke="#C84E00" stroke-width="0.5"/>
    <!-- brillo base -->
    <rect x="22" y="83" width="62" height="2.5" rx="1.2" fill="#FFA060" opacity="0.45"/>
  </g>

  <!-- ══════ TEXTO "Adobe" ══════ -->
  <text x="116" y="57"
    font-family="'Arial Rounded MT Bold','Trebuchet MS',Arial Black,Arial,sans-serif"
    font-size="44" font-weight="900" letter-spacing="-0.5"
    fill="url(#gOr)">Adobe</text>

  <!-- ══════ SEPARADORES + "Ingeniería" ══════ -->
  <line x1="116" y1="74" x2="130" y2="74" stroke="#FF7020" stroke-width="1.3" stroke-linecap="round" opacity="0.7"/>
  <text x="198" y="78"
    font-family="'Gill Sans MT','Gill Sans',Trebuchet MS,Arial,sans-serif"
    font-size="12.5" font-weight="400" letter-spacing="4.2"
    text-anchor="middle"
    fill="#FF8040">INGENIERÍA</text>
  <line x1="266" y1="74" x2="280" y2="74" stroke="#FF7020" stroke-width="1.3" stroke-linecap="round" opacity="0.7"/>
</svg>
